<!doctype html>
<html lang="id">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pembayaran Berhasil</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .success-card {
        width: 420px;

        background: #fff;

        padding: 40px;

        border-radius: 20px;

        text-align: center;

        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
      }

      .icon {
        width: 120px;
        height: 120px;
        margin: auto;
        border-radius: 50%;
        background: #e8fff1;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        color: #2ecc71;
      }

      h1 {
        margin-top: 25px;
        color: #222;
      }

      p {
        color: #666;
        line-height: 1.7;
      }

      .info {
        margin: 30px 0;
        padding: 15px;
        border-radius: 10px;
        background: #f8f8f8;
      }

      .btn {
        display: block;

        width: 100%;

        padding: 15px;

        margin-top: 15px;

        border: none;

        border-radius: 10px;

        font-size: 17px;

        cursor: pointer;

        text-decoration: none;
      }

      .home {
        background: #2c7a7b;

        color: white;
      }

      .home:hover {
        background: #215d5d;
      }

      .shop {
        background: #111;

        color: white;
      }

      .shop:hover {
        background: #333;
      }
    </style>
  </head>

  <body>
    <div class="success-card">
      <div class="icon">✔</div>

      <h1>Pembayaran Berhasil</h1>

      <p>
        Terima kasih telah berbelanja di
        <b>DMEN'STYLE Store</b>. Pesanan Anda sedang diproses.
      </p>

      <div class="info">
        <p><b>Status :</b> Diproses</p>

        <p><b>Nomor Pesanan :</b> <span id="orderId"></span></p>
      </div>

      <a href="index.html" class="btn home"> Kembali ke Beranda </a>

      <a href="produk.html" class="btn shop"> Belanja Lagi </a>
    </div>

    <script>
      document.getElementById("orderId").innerHTML =
        "INV-" + Math.floor(Math.random() * 1000000);
    </script>
  </body>
</html>
