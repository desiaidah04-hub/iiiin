<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kelola Pesanan</title>

    <link rel="stylesheet" href="pesanan.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar">
      <div class="logo">DMEN'STYLE</div>

      <ul>
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
          </a>
        </li>

        <li>
          <a href="produk.html">
            <i class="fa-solid fa-shirt"></i>
            Produk
          </a>
        </li>

        <li>
          <a href="kategori.html">
            <i class="fa-solid fa-layer-group"></i>
            Kategori
          </a>
        </li>

        <li class="active">
          <a href="pesanan.html">
            <i class="fa-solid fa-cart-shopping"></i>
            Pesanan
          </a>
        </li>

        <li>
          <a href="customer.html">
            <i class="fa-solid fa-users"></i>
            Customer
          </a>
        </li>

        <li>
          <a href="promo.html">
            <i class="fa-solid fa-tags"></i>
            Promo
          </a>
        </li>

        <li>
          <a href="laporan.html">
            <i class="fa-solid fa-chart-column"></i>
            Laporan
          </a>
        </li>

        <li>
          <a href="../login.html">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
          </a>
        </li>
      </ul>
    </div>

    <!-- ================= MAIN ================= -->

    <div class="main">
      <header>
        <div style="display: flex; align-items: center; gap: 15px">
          <button type="button" class="btn-back" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i> Kembali
          </button>
          <h2>Kelola Pesanan</h2>
        </div>

        <button id="btnTambah">
          <i class="fa-solid fa-plus"></i>

          Tambah Pesanan
        </button>
      </header>

      <!-- Toolbar -->

      <div class="toolbar">
        <input
          type="text"
          id="search"
          placeholder="Cari nama customer atau no. pesanan..."
        />

        <select id="filterStatus">
          <option value="Semua">Semua Status</option>

          <option>Menunggu Pembayaran</option>

          <option>Diproses</option>

          <option>Dikirim</option>

          <option>Selesai</option>

          <option>Dibatalkan</option>
        </select>
      </div>

      <!-- ================= TABLE ================= -->

      <div class="table-area">
        <table>
          <thead>
            <tr>
              <th>No</th>

              <th>No. Pesanan</th>

              <th>Customer</th>

              <th>Produk</th>

              <th>Total</th>

              <th>Tanggal</th>

              <th>Status</th>

              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tablePesanan"></tbody>
        </table>
      </div>
    </div>

    <!-- ================= MODAL TAMBAH / EDIT ================= -->

    <div class="modal" id="modalPesanan">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="judulModal">Tambah Pesanan</h2>

          <span id="closeModal"> &times; </span>
        </div>

        <form id="formPesanan">
          <input type="hidden" id="idPesanan" />

          <div class="form-group">
            <label>Nama Customer</label>

            <input type="text" id="customer" required />
          </div>

          <div class="form-group">
            <label>Produk (pisahkan dengan koma)</label>

            <input
              type="text"
              id="produk"
              placeholder="Contoh: Kaos Oversize x1, Hoodie Grey x2"
              required
            />
          </div>

          <div class="form-group">
            <label>Total Harga (Rp)</label>

            <input type="number" id="total" required />
          </div>

          <div class="form-group">
            <label>Tanggal Pesanan</label>

            <input type="date" id="tanggal" required />
          </div>

          <div class="form-group">
            <label>Status</label>

            <select id="status">
              <option>Menunggu Pembayaran</option>

              <option>Diproses</option>

              <option>Dikirim</option>

              <option>Selesai</option>

              <option>Dibatalkan</option>
            </select>
          </div>

          <button type="submit">Simpan Pesanan</button>
        </form>
      </div>
    </div>

    <!-- ================= MODAL DETAIL ================= -->

    <div class="modal" id="modalDetail">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Detail Pesanan</h2>

          <span id="closeDetail"> &times; </span>
        </div>

        <div id="isiDetail" style="padding: 20px"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="pesanan.js"></script>
  </body>
</html>
