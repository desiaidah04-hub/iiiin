<!doctype html>
<html lang="id">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pembayaran Gagal</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Poppins, sans-serif;
        background: #f5f5f5;
        margin: 0;
      }

      .box {
        background: white;
        padding: 50px 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        width: 340px;
      }

      .icon {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: #fdeaea;
        color: #e53935;
        font-size: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }

      p.sub {
        color: #888;
        font-size: 14px;
        margin-bottom: 25px;
      }

      a.btn {
        display: block;
        padding: 14px;
        border-radius: 10px;
        background: #111;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="icon"><i class="fa-solid fa-xmark"></i></div>
      <h2>Waktu Pembayaran Habis</h2>
      <p class="sub">
        Batas waktu pembayaran telah berakhir. Silakan coba lagi.
      </p>
      <a class="btn" href="pilih_metode.html">Coba Lagi</a>
    </div>
